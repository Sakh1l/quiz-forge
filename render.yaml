services:
  - type: web
    name: quiz-forge
    env: go
    buildCommand: go build -o quiz-forge cmd/server/main.go
    startCommand: ./quiz-forge
    envVars:
      - key: APP_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_PATH
        value: /var/lib/quiz-forge/quiz-forge.db
    disk:
      - name: quiz-forge-data
        mountPath: /var/lib/quiz-forge
        sizeGB: 1
    autoDeploy: true
