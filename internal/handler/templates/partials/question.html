<div class="space-y-4">
    <p class="text-2xl font-medium" id="question-text">{{.Question.Text}}</p>
    <div id="answer-options" class="grid grid-cols-1 gap-3 mt-6">
        {{range $i, $ans := .Question.Answers}}
        <div class="p-4 bg-gray-700/50 rounded-xl border border-gray-600">
            <span class="inline-block w-8 h-8 bg-gray-600 rounded-full text-center mr-3">{{$i | char}}</span>
            {{$ans}}
        </div>
        {{end}}
    </div>
</div>
