<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{.Quiz.Title}} - Quiz Editor</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white min-h-screen">
    <nav class="bg-gray-800 border-b border-gray-700">
        <div class="container mx-auto px-4 py-4 flex justify-between items-center">
            <a href="/host" class="text-2xl font-bold text-blue-400">← Back to Dashboard</a>
            <span class="text-gray-400">Editing: {{.Quiz.Title}}</span>
        </div>
    </nav>

    <div class="container mx-auto px-4 py-8">
        <div class="max-w-4xl mx-auto">
            <form action="/host/quiz/{{.Quiz.ID}}" method="POST" id="quizForm">
                <div class="bg-gray-800 rounded-2xl p-8 border border-gray-700 mb-8">
                    <h2 class="text-2xl font-bold mb-6">Quiz Details</h2>
                    <div class="space-y-4">
                        <div>
                            <label class="block text-sm text-gray-400 mb-2">Title</label>
                            <input type="text" name="title" value="{{.Quiz.Title}}" required
                                   class="w-full px-4 py-3 bg-gray-700 border border-gray-600 rounded-xl focus:outline-none focus:border-blue-500">
                        </div>
                        <div>
                            <label class="block text-sm text-gray-400 mb-2">Description</label>
                            <textarea name="description" rows="2"
                                      class="w-full px-4 py-3 bg-gray-700 border border-gray-600 rounded-xl focus:outline-none focus:border-blue-500">{{.Quiz.Description}}</textarea>
                        </div>
                    </div>
                </div>

                <div class="bg-gray-800 rounded-2xl p-8 border border-gray-700 mb-8">
                    <div class="flex justify-between items-center mb-6">
                        <h2 class="text-2xl font-bold">Questions</h2>
                        <button type="button" onclick="addQuestion()"
                                class="bg-blue-600 hover:bg-blue-700 px-4 py-2 rounded-lg font-medium transition">
                            + Add Question
                        </button>
                    </div>

                    <div id="questions-container" class="space-y-6">
                        {{range $i, $q := .Quiz.Questions}}
                        <div class="question-card bg-gray-700/50 rounded-xl p-6 border border-gray-600" data-index="{{$i}}">
                            <div class="flex justify-between items-start mb-4">
                                <span class="text-lg font-bold text-gray-400">Q{{add $i 1}}</span>
                                <button type="button" onclick="removeQuestion({{$i}})" class="text-red-400 hover:text-red-300">
                                    ✕ Remove
                                </button>
                            </div>
                            <input type="hidden" name="question_id_{{$i}}" value="{{$q.ID}}">
                            <div class="mb-4">
                                <label class="block text-sm text-gray-400 mb-2">Question Text</label>
                                <textarea name="question_text_{{$i}}" rows="2" required
                                          class="w-full px-4 py-3 bg-gray-600 border border-gray-500 rounded-xl focus:outline-none focus:border-blue-500">{{$q.Text}}</textarea>
                            </div>
                            <div class="space-y-3">
                                {{range $j, $ans := $q.Answers}}
                                <div class="flex items-center gap-3">
                                    <input type="radio" name="correct_{{$i}}" value="{{$j}}" {{if eq $j $q.CorrectIndex}}checked{{end}}
                                           class="w-5 h-5 accent-green-500">
                                    <input type="text" name="answer_{{$i}}_{{$j}}" value="{{$ans}}"
                                           class="flex-1 px-4 py-2 bg-gray-600 border border-gray-500 rounded-lg focus:outline-none focus:border-blue-500"
                                           placeholder="Answer {{add $j 1}}">
                                </div>
                                {{end}}
                            </div>
                        </div>
                        {{end}}
                    </div>

                    <input type="hidden" name="question_count" id="questionCount" value="{{len .Quiz.Questions}}">
                </div>

                <div class="flex justify-end gap-4">
                    <a href="/host" class="bg-gray-700 hover:bg-gray-600 px-6 py-3 rounded-xl font-medium transition">
                        Cancel
                    </a>
                    <button type="submit" class="bg-green-600 hover:bg-green-700 px-8 py-3 rounded-xl font-bold transition">
                        Save Quiz
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script>
        let questionCount = {{len .Quiz.Questions}};

        function addQuestion() {
            const container = document.getElementById('questions-container');
            const div = document.createElement('div');
            div.className = 'question-card bg-gray-700/50 rounded-xl p-6 border border-gray-600';
            div.dataset.index = questionCount;
            div.innerHTML = `
                <div class="flex justify-between items-start mb-4">
                    <span class="text-lg font-bold text-gray-400">Q${questionCount + 1}</span>
                    <button type="button" onclick="removeQuestion(${questionCount})" class="text-red-400 hover:text-red-300">
                        ✕ Remove
                    </button>
                </div>
                <input type="hidden" name="question_id_${questionCount}" value="">
                <div class="mb-4">
                    <label class="block text-sm text-gray-400 mb-2">Question Text</label>
                    <textarea name="question_text_${questionCount}" rows="2" required
                              class="w-full px-4 py-3 bg-gray-600 border border-gray-500 rounded-xl focus:outline-none focus:border-blue-500"
                              placeholder="Enter your question"></textarea>
                </div>
                <div class="space-y-3" id="answers-${questionCount}">
                    <div class="flex items-center gap-3">
                        <input type="radio" name="correct_${questionCount}" value="0" checked class="w-5 h-5 accent-green-500">
                        <input type="text" name="answer_${questionCount}_0" value="" class="flex-1 px-4 py-2 bg-gray-600 border border-gray-500 rounded-lg focus:outline-none focus:border-blue-500" placeholder="Answer 1">
                    </div>
                    <div class="flex items-center gap-3">
                        <input type="radio" name="correct_${questionCount}" value="1" class="w-5 h-5 accent-green-500">
                        <input type="text" name="answer_${questionCount}_1" value="" class="flex-1 px-4 py-2 bg-gray-600 border border-gray-500 rounded-lg focus:outline-none focus:border-blue-500" placeholder="Answer 2">
                    </div>
                </div>
                <button type="button" onclick="addAnswer(${questionCount})" class="mt-3 text-sm text-blue-400 hover:text-blue-300">
                    + Add Answer Option
                </button>
            `;
            container.appendChild(div);
            questionCount++;
            document.getElementById('questionCount').value = questionCount;
        }

        function addAnswer(qIndex) {
            const container = document.getElementById(`answers-${qIndex}`);
            const count = container.children.length;
            if (count >= 6) return;

            const div = document.createElement('div');
            div.className = 'flex items-center gap-3';
            div.innerHTML = `
                <input type="radio" name="correct_${qIndex}" value="${count}" class="w-5 h-5 accent-green-500">
                <input type="text" name="answer_${qIndex}_${count}" value="" class="flex-1 px-4 py-2 bg-gray-600 border border-gray-500 rounded-lg focus:outline-none focus:border-blue-500" placeholder="Answer ${count + 1}">
            `;
            container.appendChild(div);
        }

        function removeQuestion(index) {
            const card = document.querySelector(`[data-index="${index}"]`);
            if (card) {
                card.remove();
                renumberQuestions();
            }
        }

        function renumberQuestions() {
            const cards = document.querySelectorAll('.question-card');
            cards.forEach((card, i) => {
                card.dataset.index = i;
                card.querySelector('.text-gray-400').textContent = `Q${i + 1}`;
            });
            questionCount = cards.length;
            document.getElementById('questionCount').value = questionCount;
        }
    </script>
</body>
</html>
