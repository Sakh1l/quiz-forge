<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Host Dashboard - Quiz Forge</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white min-h-screen">
    <nav class="bg-gray-800 border-b border-gray-700">
        <div class="container mx-auto px-4 py-4 flex justify-between items-center">
            <a href="/" class="text-2xl font-bold text-blue-400">Quiz Forge</a>
            <div class="space-x-4">
                <a href="/" class="text-gray-400 hover:text-white">Home</a>
                <a href="/host" class="text-white font-medium">Dashboard</a>
            </div>
        </div>
    </nav>

    <div class="container mx-auto px-4 py-8">
        <div class="max-w-6xl mx-auto">
            <div class="flex justify-between items-center mb-8">
                <h1 class="text-3xl font-bold">Host Dashboard</h1>
                <button onclick="document.getElementById('createModal').classList.remove('hidden')"
                        class="bg-blue-600 hover:bg-blue-700 px-6 py-3 rounded-xl font-bold transition">
                    + Create New Quiz
                </button>
            </div>

            {{if .Quizzes}}
            <div class="grid md:grid-cols-2 lg:grid-cols-3 gap-6">
                {{range .Quizzes}}
                <div class="bg-gray-800 rounded-2xl p-6 border border-gray-700 hover:border-gray-600 transition">
                    <h3 class="font-bold text-xl mb-2">{{.Title}}</h3>
                    <p class="text-gray-400 text-sm mb-4 line-clamp-2">{{.Description}}</p>
                    <div class="flex items-center justify-between mb-4">
                        <span class="text-sm text-gray-500">{{len .Questions}} questions</span>
                        <span class="text-xs text-gray-600">{{.CreatedAt.Format "Jan 02, 2006"}}</span>
                    </div>
                    <div class="flex gap-2">
                        <a href="/host/quiz/{{.ID}}" 
                           class="flex-1 text-center bg-gray-700 hover:bg-gray-600 py-2 rounded-lg text-sm transition">
                            Edit
                        </a>
                        <form action="/host/quiz/{{.ID}}/delete" method="POST" class="flex-1"
                              onsubmit="return confirm('Delete this quiz?')">
                            <button type="submit" 
                                    class="w-full bg-red-600 hover:bg-red-700 py-2 rounded-lg text-sm transition">
                                Delete
                            </button>
                        </form>
                    </div>
                    <button type="button" onclick="openStartModal('{{.ID}}')" 
                            class="mt-3 w-full bg-green-600 hover:bg-green-700 py-3 rounded-xl font-bold transition">
                        ▶ Start Session
                    </button>
                </div>
                {{end}}
            </div>
            {{else}}
            <div class="text-center py-16">
                <div class="text-6xl mb-4">📝</div>
                <h2 class="text-2xl font-bold mb-4">No Quizzes Yet</h2>
                <p class="text-gray-400 mb-8">Create your first quiz to get started</p>
                <button onclick="document.getElementById('createModal').classList.remove('hidden')"
                        class="bg-blue-600 hover:bg-blue-700 px-8 py-4 rounded-xl font-bold transition">
                    Create Your First Quiz
                </button>
            </div>
            {{end}}
        </div>
    </div>

    <div id="createModal" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center z-50">
        <div class="bg-gray-800 rounded-2xl p-8 max-w-md w-full mx-4 border border-gray-700">
            <h2 class="text-2xl font-bold mb-6">Create New Quiz</h2>
            <form action="/host/quiz/create" method="POST">
                <div class="space-y-4">
                    <div>
                        <label class="block text-sm text-gray-400 mb-2">Quiz Title</label>
                        <input type="text" name="title" required
                               class="w-full px-4 py-3 bg-gray-700 border border-gray-600 rounded-xl focus:outline-none focus:border-blue-500"
                               placeholder="My Awesome Quiz">
                    </div>
                    <div>
                        <label class="block text-sm text-gray-400 mb-2">Description</label>
                        <textarea name="description" rows="3"
                                  class="w-full px-4 py-3 bg-gray-700 border border-gray-600 rounded-xl focus:outline-none focus:border-blue-500"
                                  placeholder="What is this quiz about?"></textarea>
                    </div>
                </div>
                <div class="flex gap-4 mt-6">
                    <button type="button" onclick="document.getElementById('createModal').classList.add('hidden')"
                            class="flex-1 bg-gray-700 hover:bg-gray-600 py-3 rounded-xl font-medium transition">
                        Cancel
                    </button>
                    <button type="submit"
                            class="flex-1 bg-blue-600 hover:bg-blue-700 py-3 rounded-xl font-bold transition">
                        Create
                    </button>
                </div>
            </form>
        </div>
    </div>

    <div id="startModal" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center z-50">
        <div class="bg-gray-800 rounded-2xl p-8 max-w-md w-full mx-4 border border-gray-700">
            <h2 class="text-2xl font-bold mb-6">Start Quiz Session</h2>
            <form id="startForm" action="" method="POST">
                <div class="space-y-4">
                    <div>
                        <label class="block text-sm text-gray-400 mb-2">Timer (seconds per question)</label>
                        <select name="timer" class="w-full px-4 py-3 bg-gray-700 border border-gray-600 rounded-xl focus:outline-none focus:border-blue-500">
                            <option value="0">No timer</option>
                            <option value="5">5 seconds</option>
                            <option value="10" selected>10 seconds</option>
                            <option value="15">15 seconds</option>
                            <option value="20">20 seconds</option>
                            <option value="30">30 seconds</option>
                            <option value="60">60 seconds</option>
                        </select>
                    </div>
                    <div class="flex items-center gap-3">
                        <input type="checkbox" name="shuffle" id="shuffle" class="w-5 h-5 rounded accent-blue-500">
                        <label for="shuffle" class="text-sm text-gray-400">Shuffle question order</label>
                    </div>
                </div>
                <div class="flex gap-4 mt-6">
                    <button type="button" onclick="document.getElementById('startModal').classList.add('hidden')"
                            class="flex-1 bg-gray-700 hover:bg-gray-600 py-3 rounded-xl font-medium transition">
                        Cancel
                    </button>
                    <button type="submit"
                            class="flex-1 bg-green-600 hover:bg-green-700 py-3 rounded-xl font-bold transition">
                        ▶ Start
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script>
        function openStartModal(quizId) {
            document.getElementById('startForm').action = '/host/quiz/' + quizId + '/start';
            document.getElementById('startModal').classList.remove('hidden');
        }
    </script>
</body>
</html>
